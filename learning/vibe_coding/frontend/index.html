<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Company Simulator</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1a1a1a;
        color: white;
        font-family: sans-serif;
        overflow: hidden; /* Prevent scrollbars from game canvas */
      }
      #game-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1; /* Under UI */
      }
      #ui-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none; /* Let clicks pass through to game canvas by default */
        z-index: 10; /* Over game */
      }
      /* Example UI element */
      .ui-panel {
        pointer-events: auto; /* Re-enable clicks for actual UI blocks */
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        margin: 10px;
        border-radius: 5px;
        display: inline-block;
      }
      .hud {
        display: flex;
        gap: 20px;
        font-size: 18px;
        font-weight: bold;
      }
      .controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
      }
      button {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
        transition: 0.3s;
      }
      button:hover { background-color: #45a049; }
      button.active { background-color: #008CBA; }

      #error-popup {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #f44336;
        color: white;
        padding: 15px;
        border-radius: 5px;
        font-weight: bold;
        display: none;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 100;
      }

      .right-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 220px;
        display: flex;
        flex-direction: column;
      }
      .right-panel h3 {
        margin: 5px 0 10px 0;
        font-size: 18px;
        border-bottom: 1px solid #555;
        padding-bottom: 5px;
      }
      .right-panel p {
        margin: 0 0 10px 0;
        font-size: 14px;
      }
      .info-panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 250px;
        text-align: center;
        z-index: 50;
        box-shadow: 0 4px 8px rgba(0,0,0,0.8);
      }
      .info-panel h3 { margin-top: 0; }
      .info-panel p { margin-bottom: 15px; line-height: 1.4; }
      
      /* Auth Form Styles */
      #auth-overlay {
        position: absolute;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        pointer-events: auto;
      }
      .auth-box {
        background: #222;
        padding: 30px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
      }
      .auth-box input {
        display: block;
        margin: 10px auto;
        padding: 10px;
        width: 80%;
        border-radius: 4px;
        border: none;
      }
      .auth-box button {
        margin: 5px;
      }

      /* Leaderboard Styles */
      #leaderboard-mini {
        position: absolute;
        bottom: 80px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #444;
        min-width: 150px;
        pointer-events: auto;
      }
      
      #leaderboard-mini h3 {
        margin: 0 0 5px 0;
        font-size: 16px;
        color: gold;
        text-align: center;
      }
      
      .lb-row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 3px;
      }
      
      #lb-my-rank {
        border-top: 1px dashed #666;
        margin-top: 5px;
        padding-top: 5px;
        font-weight: bold;
        color: #4CAF50;
      }

      #leaderboard-full-modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #222;
        padding: 20px;
        border-radius: 8px;
        width: 400px;
        max-height: 80vh;
        overflow-y: auto;
        display: none;
        z-index: 200;
        pointer-events: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        border: 1px solid #555;
      }
      #leaderboard-full-modal h2 { margin-top: 0; color: gold; text-align: center; }
      .lb-full-row {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        border-bottom: 1px solid #444;
      }
      .lb-full-row:nth-child(even) { background: #333; }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-container">
      <div id="error-popup">Error Message Here</div>

      <div class="ui-panel hud">
        <div id="hud-money">Money: $Loading...</div>
        <div id="hud-compute">Compute: -</div>
        <div id="hud-users">Users: -</div>
        <div id="hud-quality">Quality: -</div>
      </div>

      <div class="ui-panel controls">
        <button id="btn-cancel" class="active">Select (Cancel)</button>
        <button id="btn-build-server1">Server T1 ($100)</button>
        <button id="btn-build-server2">Server T2 ($500)</button>
        <button id="btn-build-desk">Desk ($50)</button>
        <button id="btn-build-seller1" style="background-color:#e67e22;">Seller T1 ($150)</button>
        <button id="btn-build-seller2" style="background-color:#d35400;">Seller T2 ($750)</button>
        <button id="btn-build-seller3" style="background-color:#c0392b;">Seller T3 ($2000)</button>
        <button id="btn-build-trainer1" style="background-color:#1abc9c;">Trainer T1 ($200)</button>
        <button id="btn-build-trainer2" style="background-color:#16a085;">Trainer T2 ($800)</button>
        <button id="btn-build-trainer3" style="background-color:#0e6655;">Trainer T3 ($2500)</button>
        <button id="btn-expand">Expand Room</button>
        <div style="font-size: 12px; color: #aaa; margin-top: 10px; width: 100%; text-align: center;">Press 'R' to Rotate buildings before placing!</div>
      </div>


      <div id="info-panel" class="ui-panel info-panel" style="display:none;">
        <h3 id="info-title">Building</h3>
        <p id="info-desc">Details</p>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button id="btn-info-close" style="background-color:#777;">Close</button>
          <button id="btn-info-upgrade" style="background-color:#f39c12;">Upgrade</button>
        </div>
      </div>

      <!-- Auth Overlay -->
      <div id="auth-overlay">
        <div class="auth-box">
          <h2>Welcome to AI Corp</h2>
          <p id="auth-error" style="color:red; display:none;"></p>
          <input type="text" id="auth-username" placeholder="Company Name (Username)">
          <input type="password" id="auth-password" placeholder="Password">
          <button id="btn-login" style="background-color:#2196F3;">Login</button>
          <button id="btn-register" style="background-color:#4CAF50;">Register</button>
        </div>
      </div>

      <!-- Mini Leaderboard -->
      <div id="leaderboard-mini" style="display:none;">
        <h3>Top AI Companies</h3>
        <div id="lb-mini-content">Loading...</div>
        <div id="lb-my-rank">Your Rank: -</div>
        <button id="btn-show-full-lb" style="margin-top:10px; width:100%; font-size: 12px; padding: 5px;">View Full</button>
      </div>

      <!-- Full Leaderboard -->
      <div id="leaderboard-full-modal">
        <h2>Global Leaderboard</h2>
        <div style="display:flex; justify-content:space-between; font-weight:bold; border-bottom:2px solid; padding-bottom:5px;">
          <span style="width:10%">#</span>
          <span style="flex:1">Company</span>
          <span style="width:30%; text-align:right">Net Worth</span>
        </div>
        <div id="lb-full-content" style="margin-top:10px; margin-bottom: 15px;"></div>
        <button id="btn-close-lb" style="width:100%; background-color:#777;">Close</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
