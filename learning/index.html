<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <canvas id="gameCanvas" height="200" width="100" style="border: 1px solid #000000;"></canvas>   


        <script>
            const canvas = document.getElementById("gameCanvas") 
            const ctx = canvas.getContext("2d")
            ctx.fillStyle = "red"
            ctx.fillRect(0, 0, 100, 200)
        </script>
    </body>
</html>
